version: "3.9"

# Minimal stack for running the feature-consumption examples.
# Starts MinIO (object store) and Redis (L1 cache) only.
# The Flink + Kafka pipeline is NOT included here; use the full stack in
# deploy/cdc-flink-minio-demo/ if you need end-to-end ingestion.
#
# Quick start:
#   docker compose up -d
#   pip install -r requirements.txt
#   python -m offline.batch_reader --backend minio --start 2024-01-15 --end 2024-01-15
#   python -m online.online_reader user-smith user-stubbs --batch

services:

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console UI → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Bucket init ────────────────────────────────────────────────────────────
  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/processed;
        mc mb --ignore-existing local/streamforge;
        echo 'Buckets ready.';
      "

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Materialize job ────────────────────────────────────────────────────────
  # Reads the offline MinIO layout and writes the online serving layout.
  # Run this after ingesting data into the offline store.
  materialize:
    image: python:3.11-slim
    depends_on:
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      MINIO_ENDPOINT:      minio:9000
      MINIO_ACCESS_KEY:    minioadmin
      MINIO_SECRET_KEY:    minioadmin
      MINIO_BUCKET:        processed
      REDIS_HOST:          redis
      REDIS_PORT:          "6379"
      REDIS_TTL_S:         "86400"
      MATERIALIZE_WORKERS: "8"
      WARM_REDIS:          "true"
    command: >
      /bin/sh -c "
        pip install -q -r requirements.txt &&
        python -m online.materialize --days 1
      "
    profiles:
      - materialize   # opt-in: docker compose --profile materialize up materialize

volumes:
  minio_data:

