# Iceberg REST Catalog overlay
#
# Extends docker-compose.yml with:
#   - iceberg-rest  : Iceberg REST Catalog server (tabulario/iceberg-rest)
#   - minio-init    : also creates the 'warehouse' bucket used by the catalog
#   - jobmanager    : Flink env vars for ICEBERG_ENABLED + REST catalog
#   - taskmanager   : same env vars so task managers can reach S3FileIO
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.iceberg-catalog.yml up -d
#
# The catalog becomes discoverable at http://localhost:8181 after startup.
# Any Iceberg-compatible engine (Spark, Trino, PyIceberg, etc.) can point at the
# same URL to query the tables written by the Flink job.

services:

  # ── Iceberg REST Catalog ──────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      # S3FileIO credentials — the REST server uses these to read/write metadata
      # files into MinIO on behalf of clients that create/commit tables.
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1

      # Catalog properties forwarded to the embedded Iceberg catalog.
      # Double-underscore (__) maps to a hyphen (-) in the property key.
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/v1/config"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── MinIO init: add the warehouse bucket ─────────────────────────────────
  # Merges with the base minio-init command; Docker Compose replaces entrypoint.
  minio-init:
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/processed  || true;
      /usr/bin/mc mb -p local/warehouse  || true;
      /usr/bin/mc anonymous set download local/processed  || true;
      /usr/bin/mc anonymous set download local/warehouse  || true;
      echo 'MinIO buckets ready.'
      "

  # ── Flink JobManager: Iceberg REST catalog env ───────────────────────────
  jobmanager:
    depends_on:
      iceberg-rest:
        condition: service_healthy
    environment:
      ICEBERG_ENABLED: "true"
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_REST_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      ICEBERG_DATABASE: streamforge
      ICEBERG_TABLE: user_event_counts
      ICEBERG_S3_ENDPOINT: http://minio:9000
      ICEBERG_S3_ACCESS_KEY: minioadmin
      ICEBERG_S3_SECRET_KEY: minioadmin

  # ── Flink TaskManager: same Iceberg env so S3FileIO can write data files ─
  taskmanager:
    depends_on:
      iceberg-rest:
        condition: service_healthy
    environment:
      ICEBERG_ENABLED: "true"
      ICEBERG_CATALOG_TYPE: rest
      ICEBERG_REST_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      ICEBERG_DATABASE: streamforge
      ICEBERG_TABLE: user_event_counts
      ICEBERG_S3_ENDPOINT: http://minio:9000
      ICEBERG_S3_ACCESS_KEY: minioadmin
      ICEBERG_S3_SECRET_KEY: minioadmin

