services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: streamforge
      MYSQL_USER: debezium
      MYSQL_PASSWORD: debezium
      MYSQL_ROOT_PASSWORD: root
    command:
      [
        "--server-id=184054",
        "--log-bin=mysql-bin",
        "--binlog-format=ROW",
        "--binlog-row-image=FULL",
        "--default-authentication-plugin=mysql_native_password"
      ]
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  connect:
    # Debezium provides a Kafka Connect image with the MySQL connector plugin preinstalled.
    image: debezium/connect:2.5
    depends_on:
      - kafka
      - mysql
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: connect-debezium
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /kafka/connect/plugins

      # Helps the connector use short-lived temporary files.
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    volumes:
      - ./connector-config.json:/tmp/connector-config.json:ro

  connector-setup:
    image: curlimages/curl:8.7.1
    depends_on:
      - connect
    volumes:
      - ./connector-config.json:/connector-config.json:ro
    command: >
      sh -c '
        for i in $(seq 1 60); do
          if curl -sS http://connect:8083/connectors >/dev/null 2>&1; then
            break;
          fi;
          sleep 1;
        done;
        curl -sS -X POST -H "Content-Type: application/json" \
          --data @/connector-config.json \
          http://connect:8083/connectors || true;
        echo "Connector setup attempted."
      '


